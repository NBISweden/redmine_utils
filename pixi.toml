[workspace]
authors = ["bsennblad <bengt.sennblad@scilifelab.se>", "asa bjorklund"]
channels = ["conda-forge", "bioconda"]
name = "redmine_utils"
platforms = ["linux-64", "osx-arm64", "osx-64"]
version = "0.1.0"


# COMMENT, I use VScode, but perhaps other want to keep this for rstudio? 
[target.linux.tasks]
rstudio = "rstudio"

[target.osx.tasks]
#rstudio = "open -a rstudio"
rstudio = "/Applications/RStudio.app/Contents/MacOS/RStudio"

[dependencies]
python = ">=3.14.0,<3.15"
quarto = ">=1.8.25,<2"
pandas = ">=2.3.3,<3"
yaml = ">=0.2.5,<0.3"
requests = ">=2.32.5,<3"
pyyaml = ">=6.0.3,<7"
pip = ">=25.3,<26"
ipykernel = ">=7.1.0,<8"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.2,<0.14"
nbformat = ">=5.10.4,<6"
nbclient = ">=0.10.2,<0.11"
tabulate = ">=0.9.0,<0.10"
jinja2 = ">=3.1.6,<4"

